# Catppuccin Mocha palette.
# Theme-only base; extend from a user config to add layout:
#   extends = "catppuccin"
# Source: https://github.com/catppuccin/catppuccin

[meta]
name = "catppuccin"

[theme]
base       = "#1e1e2e"
mantle     = "#181825"
surface    = "#313244"
overlay    = "#6c7086"
muted      = "#6c7086"
subtext    = "#bac2de"
fg         = "#cdd6f4"
rosewater  = "#f5e0dc"
flamingo   = "#f2cdcd"
pink       = "#f5c2e7"
mauve      = "#cba6f7"
red        = "#f38ba8"
maroon     = "#eba0ac"
peach      = "#fab387"
yellow     = "#f9e2af"
green      = "#a6e3a1"
teal       = "#94e2d5"
sky        = "#89dceb"
sapphire   = "#74c7ec"
blue       = "#89b4fa"
lavender   = "#b4befe"

# Convenience aliases that other widgets reach for.
accent     = "${theme.mauve}"
secondary  = "${theme.teal}"
warm       = "${theme.yellow}"
hot        = "${theme.red}"
ok         = "${theme.green}"
border_fg  = "${theme.muted}"
bar_filled = "${theme.accent}"
bar_empty  = "${theme.surface}"
