# Nord palette.
# Theme-only base; extend from a user config to add layout:
#   extends = "nord"
# Source: https://www.nordtheme.com/

[meta]
name = "nord"

[theme]
nord0  = "#2e3440"
nord1  = "#3b4252"
nord2  = "#434c5e"
nord3  = "#4c566a"
nord4  = "#d8dee9"
nord5  = "#e5e9f0"
nord6  = "#eceff4"
nord7  = "#8fbcbb"
nord8  = "#88c0d0"
nord9  = "#81a1c1"
nord10 = "#5e81ac"
nord11 = "#bf616a"
nord12 = "#d08770"
nord13 = "#ebcb8b"
nord14 = "#a3be8c"
nord15 = "#b48ead"

bg         = "${theme.nord0}"
fg         = "${theme.nord4}"
muted      = "${theme.nord3}"
subtext    = "${theme.nord4}"
accent     = "${theme.nord8}"
secondary  = "${theme.nord14}"
warm       = "${theme.nord13}"
hot        = "${theme.nord11}"
ok         = "${theme.nord14}"
border_fg  = "${theme.muted}"
bar_filled = "${theme.accent}"
bar_empty  = "${theme.nord1}"
